unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Reload config file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

bind m \
    set -g renumber-windows on\; \
    new-window\; kill-window\; \
    set -g renumber-windows off\; \
    display-message "Windows reordered..."

# enable mouse
set -g mouse on

# copy to system
set-option -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# Don't rename windows automatically
set-option -g allow-rename off

# Use vim keybinding in pref+[
set-window-option -g mode-keys vi

# Improve colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback buffer size
set -g history-limit 50000

# Set status bar
set-option -sg escape-time 0
set-option -g focus-events on

set -g display-time 4000

set -g status-interval 5

set-option -g default-shell /usr/bin/fish
set-option -g update-environment "PATH"

set -g update-environment "PATH DISPLAY SSH_ASKPASS SSH_AUTH_SOCK |
WSLENV WSL_DISTRO_NAME WSL_INTEROP WT_SESSION VSCODE_IPC_HOOK_CLI |
WSLG_DISPLAY WSLG_RUNTIME_DIR WAYLAND_DISPLAY XDG_RUNTIME_DIR"

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind -n M-h resize-pane -L 5
bind -n M-l resize-pane -R 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Theme
# set -g status off
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-indicator-str "  hi  "
set -g @minimal-tmux-fg "#000000"
set -g @minimal-tmux-bg "#698D23"

# Configure tmux-resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Configure tmux-continuum
set -g @resurrect-processes 'python nvim '
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
